name: "Bug report"
description: "Some bug to report."
title: "BUG TITLE"
body:
  - type: "input"
    id: "nixpkgs-version"
    attributes:
      label: "Nixpkgs version"
      description: |
        What version of Nixpkgs are you using? Please post the exact commit. This is often pinned via flakes.
    validations:
      required: true
  - type: "input"
    id: "press-version"
    attributes:
      label: "Press version"
      description: |
        What version of Press are you using? Please post the exact commit. This is often pinned via flakes.
    validations:
      required: true
  - type: "textarea"
    id: "description"
    attributes:
      label: "Describe the bug"
      description: "Please include a clear and concise description of what the issue is."
    validations:
      required: true
  - type: "textarea"
    id: "how-to-reproduce"
    attributes:
      label: "Steps to reproduce"
      description: "Please include a step-by-step guide for reproducing this issue. Consider writing in concise, numbered bullet points to ensure that developers can retrace your steps."
    validations:
      required: true
  - type: "input"
    id: "expected-behaviour"
    attributes:
      label: "Expected behaviour"
      description: "Please write a concise description of what was supposed to happen."
    validations:
      required: true
  - type: "textarea"
    id: "screenshots"
    attributes:
      label: "Screenshots"
      description: |
        If applicable, add screenshots to help explain your problem.
        If you need help uploading images to GitHub, please review the [relevant documentation](https://docs.github.com/en/get-started/writing-on-github/getting-started-with-writing-and-formatting-on-github/basic-writing-and-formatting-syntax#uploading-assets).
    validations:
      required: false
  - type: "textarea"
    id: "code"
    attributes:
      label: "Code ran"
      description: |
        Copy and paste all code ran.
        You can also upload a zip file.
      render: "nix"
    validations:
      required: true
  - type: "textarea"
    id: "logs"
    attributes:
      label: "Log output"
      description: |
        Copy and paste all log output.
        This will be automatically formatted into code, so no need for backticks.
      render: "console"
    validations:
      required: true
  - type: "textarea"
    id: "metadata"
    attributes:
      label: "System metadata"
      description: "Please run `nix run nixpkgs#nix-info -- -m` on a terminal and paste the output of that command here."
    validations:
      required: true
