name: Checks
on:
  push:

jobs:
  calc-matrix:
    name: Run checks
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.calc-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix ❄️
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run checks
        run: |
          nix run nixpkgs#nix-fast-build -- --file tests
